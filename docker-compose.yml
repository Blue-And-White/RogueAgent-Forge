    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      # Note: We do not hardcode API keys here; users should create .env in the backend folder or provide it here.
    env_file:
      - ./e-commerce-support/backend/.env
    networks:
      - ctf_network

  e-commerce-frontend:
    build:
      context: ./e-commerce-support/frontend
