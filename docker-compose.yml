version: '3.8'

services:
  scoreboard-backend:
    build: 
      context: ./scoreboard/backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    networks:
      - ctf_network

  scoreboard-frontend:
    build:
      context: ./scoreboard/frontend
